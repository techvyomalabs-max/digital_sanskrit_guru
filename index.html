<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Tag Manager and Consent Mode v2 Setup (GDPR & DPDP Act 2023 Compliant) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Fetch stored consent preferences or default to denied
      window.dsgConsentSettings = { analytics: false, marketing: false };
      try {
        const storedConsent = localStorage.getItem("dsg-cookie-consent");
        if (storedConsent) {
          window.dsgConsentSettings = JSON.parse(storedConsent);
        }
      } catch (e) {}

      gtag('consent', 'default', {
        'analytics_storage': window.dsgConsentSettings.analytics ? 'granted' : 'denied',
        'ad_storage': window.dsgConsentSettings.marketing ? 'granted' : 'denied',
        'ad_user_data': window.dsgConsentSettings.marketing ? 'granted' : 'denied',
        'ad_personalization': window.dsgConsentSettings.marketing ? 'granted' : 'denied',
        'security_storage': 'granted' // Necessary cookies are always granted
      });
    </script>
    <!-- Google Tag Manager Container -->
    <script>
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-W3V5K29D');
    </script>
    <!-- End Google Tag Manager -->

    <!-- Meta Pixel (Facebook SDK) Setup -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');

      // Sync initial consent choice with Facebook Pixel
      if (!window.dsgConsentSettings || !window.dsgConsentSettings.marketing) {
        fbq('consent', 'revoke');
      } else {
        fbq('consent', 'grant');
      }

      fbq('init', 'YOUR_FACEBOOK_PIXEL_ID');
      fbq('track', 'PageView');
    </script>
    <!-- End Meta Pixel -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Google Fonts — Inter (primary) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google Fonts — Inter (primary) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Widescreen Hero Banner image preload for instant paint (LCP reduction) -->
    <script>
      (function() {
        const hash = window.location.hash;
        // In a HashRouter SPA, pathname is always "/" on all pages. 
        // We must only check the hash to identify the homepage.
        if (hash === "" || hash === "#" || hash === "#/") {
          const link = document.createElement("link");
          link.rel = "preload";
          link.as = "image";
          link.href = "/assets/main-hero.webp";
          link.fetchPriority = "high";
          document.head.appendChild(link);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover premium Sanskrit learning materials, grammar guides, scriptures, and traditional kits at Digital Sanskrit Guru." />
    
    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Digital Sanskrit Guru" />
    <meta property="og:description" content="Discover premium Sanskrit learning materials, grammar guides, scriptures, and traditional kits at Digital Sanskrit Guru." />
    <meta property="og:image" content="/logo.png" />
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Digital Sanskrit Guru" />
    <meta name="twitter:description" content="Discover premium Sanskrit learning materials, grammar guides, scriptures, and traditional kits at Digital Sanskrit Guru." />
    <meta name="twitter:image" content="/logo.png" />

    <title>Digital Sanskrit Guru</title>
  </head>
  <body>
    <!-- Meta Pixel (Facebook SDK) Noscript fallback -->
    <noscript>
      <img height="1" width="1" style="display:none" 
           src="https://www.facebook.com/tr?id=YOUR_FACEBOOK_PIXEL_ID&ev=PageView&noscript=1" />
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
